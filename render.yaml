services:
  - type: web
    name: ssae-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard           # use "starter" for free tier (single worker, slower cold start)
    region: singapore        # change to: oregon | frankfurt | ohio | virginia

    # ── Environment ──────────────────────────────────────────────────────────
    envVars:
      - key: PORT
        value: "8000"
      - key: PYTHONUNBUFFERED
        value: "1"
      # Uncomment to persist EasyOCR model cache across deploys
      # - key: EASYOCR_MODULE_PATH
      #   value: /data/.EasyOCR

    # ── Health check ─────────────────────────────────────────────────────────
    healthCheckPath: /health

    # ── Autoscaling (standard plan) ──────────────────────────────────────────
    scaling:
      minInstances: 1
      maxInstances: 3
      targetMemoryPercent: 80
      targetCPUPercent: 75

    # ── Persistent disk for model cache (optional, recommended) ──────────────
    # disk:
    #   name: ssae-model-cache
    #   mountPath: /data
    #   sizeGB: 5
